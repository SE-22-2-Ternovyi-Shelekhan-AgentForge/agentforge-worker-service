services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: agentforge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: agentforge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

volumes:
  ollama-models:
